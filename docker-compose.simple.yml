# =============================================================================
# CONMAN - Simplified Docker Compose
# Single unified image (frontend + backend) + optional agent
# =============================================================================

services:
  # Unified Conman Server (Frontend + Backend in one container)
  conman-server:
    build:
      context: .
      dockerfile: Dockerfile.unified
    image: conman-server:latest
    container_name: conman-server
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - conman_data:/app/data
    environment:
      - PORT=5173
      - DATABASE_DRIVER=${DATABASE_DRIVER:-sqlite}
      - DATABASE_URL=/app/data/app.db
      - DATABASE_DSN=host=conman-db port=5432 user=conman password=${POSTGRES_PASSWORD:-conman} dbname=conman sslmode=disable
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - STATIC_DIR=/app/static
      - CORS_ORIGINS=http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Local Agent (manages the local docker socket)
  local-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: conman-agent:latest
    container_name: conman-local-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp/conman-stacks:/tmp/conman-stacks
    environment:
      - AGENT_NAME=Local Agent
      - CONMAN_SERVER_URL=http://conman-server:5173
      - CONMAN_SERVER_TOKEN=${AGENT_TOKEN:-}
      - AGENT_MODE=hybrid
      - COLLECT_INTERVAL=10s
      - SCRAPE_PORT=5073
      - SCRAPE_ENABLED=true
      - ADVERTISED_ADDRESS=conman-local-agent
    depends_on:
      conman-server:
        condition: service_started


  # PostgreSQL (optional - set DATABASE_DRIVER=postgres to use)
  conman-db:
    image: postgres:16-alpine
    container_name: conman-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=conman
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-conman}
      - POSTGRES_DB=conman
    volumes:
      - conman_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conman"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  conman_data:
  conman_pgdata:
