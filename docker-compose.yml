version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:8000
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backend_data:/app/data
    privileged: true
    environment:
      - DATABASE_URL=./data/app.db
      - SECRET_KEY=your-secret-key-here
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - app-network

  # Local Agent (for testing multi-host architecture)
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9095:9090"
      - "9096:9091"
    environment:
      - AGENT_NAME=local-host
      - CONMAN_SERVER_URL=http://backend:8000
      - AGENT_MODE=hybrid
      - COLLECT_INTERVAL=10s
      - METRICS_INTERVAL=5s
      - HEARTBEAT_INTERVAL=30s
      - SCRAPE_ENABLED=true
      - SCRAPE_PORT=9091
      - PUSH_ENABLED=true
    networks:
      - app-network
    depends_on:
      - backend

    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # ---------------------------------------------------------------------------
  # ZITADEL (IAM)
  # ---------------------------------------------------------------------------
  zitadel-db:
    image: postgres:16-alpine
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - zitadel_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zitadel-init:
    image: ghcr.io/zitadel/zitadel:latest
    command: 'init --config /zitadel.yaml'
    depends_on:
      zitadel-db:
        condition: service_healthy
    volumes:
      - ./zitadel-config.yaml:/zitadel.yaml
    environment:
      ZITADEL_MASTERKEY: MasterkeyNeedsToBe32BytesLong123
    networks:
      - app-network

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: 'start --config /zitadel.yaml --masterkeyFromEnv --tlsMode disabled'
    depends_on:
      zitadel-db:
        condition: service_healthy
      zitadel-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./zitadel-config.yaml:/zitadel.yaml
    environment:
      ZITADEL_MASTERKEY: MasterkeyNeedsToBe32BytesLong123
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Kong (API Gateway)
  # ---------------------------------------------------------------------------
  kong-db:
    image: postgres:13-alpine
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong_password
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.5
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_password
    networks:
      - app-network

  kong:
    image: kong:3.5
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_password
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8001:8001" # Admin
      - "8002:8002" # Portal
      - "8003:8003" # Proxy (HTTP)
      - "8004:8004" # Proxy (HTTPS)
    networks:
      - app-network

volumes:
  frontend_node_modules:
  zitadel_data:
  kong_data:
  backend_data:
  crdb_data: # Can remove if sure not needed, but safe to keep for now

networks:
  app-network:
    driver: bridge
